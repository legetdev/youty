[project]
name = "youty-mcp"
version = "0.1.0"
description = "Youty MCP server — exposes the Youty vault index (sqlite-vec + FTS5) to MCP-compatible AIs."
authors = [
    { name = "Bent Eisheuer", email = "legetdev@gmail.com" }
]
requires-python = ">=3.11"
dependencies = [
    "mcp>=1.2.0",
    "sqlite-vec>=0.1.6",
    "httpx>=0.27.0",
    "numpy>=1.26.0",
    "coremltools>=9.0",
]

[project.scripts]
youty-mcp = "youty_mcp.server:main"

[build-system]
requires = ["uv_build>=0.10.9,<0.11.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "pytest>=8.0.0",
]
