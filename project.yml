name: youty
options:
  bundleIdPrefix: dev.leget
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""

targets:
  youty:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "IndexSchema.sql"
      - path: Sources/IndexSchema.sql
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.leget.youty
        INFOPLIST_FILE: Sources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/youty.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        SWIFT_OBJC_BRIDGING_HEADER: Sources/FFmpegBridging.h
        HEADER_SEARCH_PATHS: $(SRCROOT)/Vendor/ffmpeg/include
        LIBRARY_SEARCH_PATHS: $(SRCROOT)/Vendor/ffmpeg/lib
        OTHER_LDFLAGS: "-lavcodec -lavformat -lavutil -lswscale -liconv -lbz2 -lz -lsqlite3 -framework Security -framework CoreFoundation -framework AudioToolbox -framework VideoToolbox"
    entitlements:
      path: Sources/youty.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.files.bookmarks.app-scope: true
