name: youty
options:
  bundleIdPrefix: dev.leget
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.0"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
  configs:
    Release:
      # Compacting (Phase Q.5): strip + dead-code + size opt + LTO for
      # Release builds only. Debug stays unaffected so iteration speed +
      # debuggability are preserved.
      DEAD_CODE_STRIPPING: YES
      STRIP_INSTALLED_PRODUCT: YES
      DEPLOYMENT_POSTPROCESSING: YES
      STRIP_STYLE: all
      GCC_OPTIMIZATION_LEVEL: s         # size-optimized C/ObjC
      SWIFT_OPTIMIZATION_LEVEL: "-O"    # default Release optimization
      SWIFT_COMPILATION_MODE: wholemodule
      LLVM_LTO: YES                     # link-time optimization for both Swift + clang
      OTHER_LDFLAGS: "$(inherited) -dead_strip"

targets:
  youty:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "IndexSchema.sql"
      - path: Sources/IndexSchema.sql
        buildPhase: resources
      # Bundled license texts — surfaced by the in-app About panel and
      # required for LGPL §1 compliance (accompany the binary with the
      # license text of every LGPL-licensed component).
      - path: THIRD_PARTY_LICENSES.md
        buildPhase: resources
      - path: Vendor/ffmpeg/licenses
        buildPhase: resources
      # SigLIP image encoder + its Apache-2.0 license text. The .mlpackage
      # ships inside the app bundle so the indexer can compile + load it
      # on first use without any runtime download.
      - path: Vendor/siglip/models/SigLIP-Base-224_image.mlpackage
        buildPhase: resources
      - path: Vendor/siglip/licenses
        buildPhase: resources
      # EmbeddingGemma on-device text encoder (Phase S.1): the Core ML model +
      # its compact native tokenizer artifact (vocab/merges/added_tokens .bin —
      # the 32 MB tokenizer.json is deliberately NOT shipped) + the Gemma-license
      # NOTICE. The .mlpackage auto-compiles to .mlmodelc in the bundle. Dormant
      # until S.2 flips the default text embedder; bundled now so v1 ships key-free.
      - path: Vendor/embeddinggemma/models/EmbeddingGemma-300m_text.mlpackage
        buildPhase: resources
      - path: Vendor/embeddinggemma/tokenizer/vocab.bin
        buildPhase: resources
      - path: Vendor/embeddinggemma/tokenizer/merges.bin
        buildPhase: resources
      - path: Vendor/embeddinggemma/tokenizer/added_tokens.bin
        buildPhase: resources
      - path: Vendor/embeddinggemma/licenses
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.leget.youty
        INFOPLIST_FILE: Sources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/youty.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: "AppIcon"
        SWIFT_OBJC_BRIDGING_HEADER: Sources/FFmpegBridging.h
        HEADER_SEARCH_PATHS: $(SRCROOT)/Vendor/ffmpeg/include
        LIBRARY_SEARCH_PATHS: $(SRCROOT)/Vendor/ffmpeg/lib
        OTHER_LDFLAGS: "-lavcodec -lavformat -lavutil -lswscale -liconv -lbz2 -lz -lsqlite3 -framework Security -framework CoreFoundation -framework AudioToolbox -framework VideoToolbox"
    dependencies:
      - target: YoutyShareExtension
      - package: Sparkle
    entitlements:
      path: Sources/youty.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.files.bookmarks.app-scope: true

  YoutyShareExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: ShareExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.leget.youty.ShareExtension
        PRODUCT_NAME: "Save to Youty"
        INFOPLIST_FILE: ShareExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: ShareExtension/ShareExtension.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../../../../Frameworks"
    entitlements:
      path: ShareExtension/ShareExtension.entitlements
      properties:
        com.apple.security.app-sandbox: true

  youty-cli:
    type: tool
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "IndexSchema.sql"
          - "Info.plist"
          - "youty.entitlements"
          - "Assets.xcassets"
          - "AppIcon.icon"
          # GUI-only — the CLI has its own main + no SwiftUI surface
          - "youtyApp.swift"
          - "AppDelegate.swift"
          - "ContentView.swift"
          - "SettingsView.swift"
          - "AuthLoginView.swift"
          - "MenuBarController.swift"
          - "MainWindowKeeper.swift"
          - "IngestionFunnel.swift"
          - "YoutyAppIntents.swift"
          - "DebugRunner.swift"
          - "OnboardingView.swift"
          - "IndexBadgeView.swift"
          - "IndexStatusStore.swift"
          - "AppUpdater.swift"
      - path: Sources/IndexSchema.sql
        buildPhase: resources
      # CLI binary uses the same bundled SigLIP image encoder as the Mac
      # app — frame embedding happens during `youty save`. Resource is
      # picked up by the binary's enclosing bundle (or, if the CLI was
      # invoked standalone, via the bundle-walking fallback in
      # SigLIPLoader.bundledModelURL()).
      - path: Vendor/siglip/models/SigLIP-Base-224_image.mlpackage
        buildPhase: resources
      - path: Vendor/siglip/licenses
        buildPhase: resources
      # EmbeddingGemma text encoder for CLI text indexing parity (Phase S.1).
      # Standalone CLI resolves these from the shared dir install-cli.sh
      # populates (SharedResourceLocator); dormant until S.2.
      - path: Vendor/embeddinggemma/models/EmbeddingGemma-300m_text.mlpackage
        buildPhase: resources
      - path: Vendor/embeddinggemma/tokenizer/vocab.bin
        buildPhase: resources
      - path: Vendor/embeddinggemma/tokenizer/merges.bin
        buildPhase: resources
      - path: Vendor/embeddinggemma/tokenizer/added_tokens.bin
        buildPhase: resources
      - path: Vendor/embeddinggemma/licenses
        buildPhase: resources
      - path: CLI
    settings:
      base:
        PRODUCT_NAME: youty
        PRODUCT_BUNDLE_IDENTIFIER: dev.leget.youty.cli
        SWIFT_OBJC_BRIDGING_HEADER: Sources/FFmpegBridging.h
        HEADER_SEARCH_PATHS: $(SRCROOT)/Vendor/ffmpeg/include
        LIBRARY_SEARCH_PATHS: $(SRCROOT)/Vendor/ffmpeg/lib
        OTHER_LDFLAGS: "-lavcodec -lavformat -lavutil -lswscale -liconv -lbz2 -lz -lsqlite3 -framework Security -framework CoreFoundation -framework AudioToolbox -framework VideoToolbox -framework Foundation -framework AppKit -framework WebKit -framework Speech"
        SKIP_INSTALL: NO
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_STYLE: Automatic
