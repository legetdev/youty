name: Publish youty-mcp to PyPI

# Publishes the youty-mcp package to PyPI using PyPI Trusted Publishing (OIDC).
# No API token is stored anywhere — PyPI verifies a short-lived identity token
# minted by GitHub for this exact repo + workflow. Trigger it manually from the
# Actions tab ("Run workflow"), or it runs automatically when a GitHub release
# is published.

on:
  workflow_dispatch: {}
  release:
    types: [published]

permissions:
  contents: read
  id-token: write          # required for Trusted Publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      # Pinned to commit SHAs (not moving tags) so a tag-hijack can't swap the
      # action under us. Dependabot proposes bumps. Trailing comment = the tag.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Official uv action from Astral (the makers of uv).
      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6

      - name: Build wheel + sdist
        working-directory: youty-mcp
        run: uv build

      - name: Publish to PyPI (Trusted Publishing)
        working-directory: youty-mcp
        run: uv publish
