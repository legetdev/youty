name: Homebrew bottle

# T.2 — build a precompiled Homebrew bottle so `brew install legetdev/youty/youty`
# is an instant binary pour (no Xcode 26, no from-source compile, no models build
# on the user's Mac). Bottles can only be built on a real macOS 26 runner — the
# dev Mac's Command Line Tools are too old for `brew` — so this lives in CI.
#
# What it does, end to end, on a clean macos-26 runner:
#   1. Build the formula from source with `--build-bottle` (relocatable layout).
#   2. `brew bottle` it → a per-(macOS major × arch) .tar.gz + a JSON manifest.
#   3. Upload the bottle tarball to the matching GitHub Release (same place as the
#      DMG + models asset), which is the bottle's `root_url`.
#   4. Splice the generated `bottle do … end` block (with real sha256s) into the
#      in-repo formula and, if a tap token is configured, into the published tap.
#   5. Pour the *published* bottle on a clean prefix and smoke-test it, so the
#      bottle is verified working before anyone installs it.
#
# `--build-from-source` always remains as the fallback for archs/macOS majors we
# don't bottle (e.g. Intel) — adding a `bottle do` block is purely additive.

on:
  # Driven explicitly by Scripts/release.sh: it dispatches this AFTER pushing the
  # tag, waits for it, and syncs the resulting bottle block to the tap. Not on
  # `release: published` — letting release.sh own the ordering means the bottle
  # never races a not-yet-pushed formula update. Also runnable by hand to re-bottle.
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to bottle (must already exist, e.g. v1.1.0); or HEAD to verify the build against main"
        required: true

permissions:
  contents: write # upload the bottle asset to the release

concurrency:
  group: bottle-${{ github.event.inputs.tag }}
  cancel-in-progress: false

jobs:
  bottle:
    name: Build + verify bottle (macOS 26, arm64)
    runs-on: macos-26
    env:
      TAG: ${{ github.event.inputs.tag }}
      FORMULA: legetdev/youty/youty
      # Routed through env because the `secrets` context can't be read in a
      # step-level `if:` — the optional tap-push step checks `env.TAP_TOKEN`.
      TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      # GitHub-hosted Homebrew is noisy + auto-updates mid-run; pin it quiet.
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_INSTALL_CLEANUP: "1"
      HOMEBREW_NO_ANALYTICS: "1"
      # Disable the build sandbox so xcodebuild can resolve the one SPM dependency
      # (Sparkle) over the network. The poured bottle needs no build/network, so
      # end users are unaffected; the app's runtime App Sandbox is unrelated.
      HOMEBREW_NO_SANDBOX: "1"
    steps:
      - name: Check out the formula (default branch)
        # Use the formula on the default branch, not the tag: the tagged in-repo
        # copy carries a placeholder source sha256 (the real one is filled into the
        # published tap at release time). brew downloads the actual TAG source via
        # the formula's `url`, so the build still targets the released version.
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Show toolchain
        run: brew --version && xcodebuild -version

      - name: Stage the formula as a local tap (source pinned to the tag)
        # CI bottles the formula that ships in this commit. For a tagged bottle we
        # rewrite the formula's SOURCE url + sha to the exact tag being built, so the
        # build never depends on the default branch's formula being up to date and
        # never trips on the placeholder sha a tagged in-repo copy may carry.
        run: |
          TAP_DIR="$(brew --repository)/Library/Taps/legetdev/homebrew-youty"
          mkdir -p "$TAP_DIR/Formula"
          F="$TAP_DIR/Formula/youty.rb"
          cp Scripts/homebrew/youty.rb "$F"
          if [ "$TAG" != "HEAD" ]; then
            SRC_SHA="$(curl -sL "https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${TAG}.tar.gz" | shasum -a 256 | awk '{print $1}')"
            # Source url (the archive/refs/tags one — not the models-resource url).
            sed -i '' -E "s#archive/refs/tags/[^\"]*\.tar\.gz#archive/refs/tags/${TAG}.tar.gz#" "$F"
            # Replace only the FIRST sha256 (the source sha; the models-resource sha is later, untouched).
            awk -v sha="$SRC_SHA" '!d && /sha256 "[0-9a-f]+"/{sub(/sha256 "[0-9a-f]+"/,"sha256 \"" sha "\"");d=1}{print}' "$F" > "$F.t" && mv "$F.t" "$F"
            echo "  source pinned to ${TAG} (sha ${SRC_SHA:0:12}…)"
          fi
          git -C "$TAP_DIR" init -q
          git -C "$TAP_DIR" add -A
          git -C "$TAP_DIR" -c user.email=ci@youty -c user.name=ci commit -qm "ci bottle" || true

      - name: Build from source (tag = release bottle; HEAD = verify against main)
        run: |
          ROOT_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          echo "ROOT_URL=$ROOT_URL" >> "$GITHUB_ENV"
          if [ "$TAG" = "HEAD" ]; then
            # Verify the build fix against the default branch, whose source carries
            # project-cli.yml (released tags get the full bottle path). HEAD installs
            # can't be bottled, so the bottle/publish steps below are skipped.
            brew install --HEAD --verbose "$FORMULA"
          else
            brew install --build-bottle --verbose "$FORMULA"
          fi

      - name: Smoke-test the built CLI before publishing anything
        # The binary installed by --build-bottle is byte-identical to what gets
        # bottled, so verifying it here gates the upload: a broken build never
        # reaches the release.
        run: |
          youty --version | grep -E "^youty 1\."
          youty --help | grep -q USAGE
          echo "✓ source-built CLI runs"

      - name: Bottle it
        if: ${{ env.TAG != 'HEAD' }}
        run: |
          # Emits youty--<ver>.<tag>.bottle.tar.gz + .json in the working dir.
          brew bottle --json --no-rebuild --root-url="$ROOT_URL" "$FORMULA"

      - name: Normalize the bottle filename for upload
        if: ${{ env.TAG != 'HEAD' }}
        # `brew bottle` writes the local file with a double dash; the URL brew
        # later constructs from root_url uses a single dash — rename to match so
        # the published asset resolves.
        run: |
          for f in youty--*.bottle.tar.gz; do
            mv "$f" "${f/youty--/youty-}"
          done
          ls -1 youty-*.bottle.tar.gz

      - name: Upload the bottle to the release
        if: ${{ env.TAG != 'HEAD' }}
        run: |
          gh release upload "$TAG" youty-*.bottle.tar.gz --clobber --repo "$GITHUB_REPOSITORY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Splice the bottle block into the formula
        if: ${{ env.TAG != 'HEAD' }}
        # Merge the `bottle do … end` block into the tap formula that's already
        # pinned to this tag (don't re-copy the repo formula — that would drop the
        # tag pin). The result, tag-pinned source + bottle block, is exactly what
        # release.sh downloads as an artifact and pushes to the tap.
        run: |
          F="$(brew --repository)/Library/Taps/legetdev/homebrew-youty/Formula/youty.rb"
          brew bottle --merge --write --no-commit ./*.bottle.json
          cp "$F" Scripts/homebrew/youty.rb
          echo "----- updated formula bottle block -----"
          sed -n '/bottle do/,/end/p' Scripts/homebrew/youty.rb

      - name: Verify — pour the published bottle on a clean prefix + smoke-test
        if: ${{ env.TAG != 'HEAD' }}
        run: |
          brew uninstall --force youty
          # Force a real download+pour of the just-uploaded bottle (not the source).
          brew install --force-bottle "$FORMULA"
          youty --version | grep -E "^youty 1\."
          youty --help | grep -q USAGE
          echo "✓ published bottle pours + runs"

      - name: Publish the updated formula (job summary + artifact)
        if: ${{ env.TAG != 'HEAD' }}
        # The checkout is a detached tag, so we don't push to main from here
        # (avoids divergence). The owner commits the block via the next
        # Scripts/release.sh run; the tap — the actual install source — is updated
        # directly below. The full formula is also attached for convenience.
        run: |
          {
            echo "### Homebrew bottle block for \`${TAG}\`"
            echo '```ruby'
            sed -n '/bottle do/,/end/p' Scripts/homebrew/youty.rb
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload the bottled formula as an artifact
        if: ${{ env.TAG != 'HEAD' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: youty-formula-${{ env.TAG }}
          path: Scripts/homebrew/youty.rb

      - name: Propagate the bottled formula to the published tap (optional)
        # Only runs if a tap deploy token is configured. Without it, the owner
        # syncs the formula to the tap via Scripts/release.sh (DO_TAP) as today.
        if: ${{ env.TAG != 'HEAD' && env.TAP_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ env.TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/legetdev/homebrew-youty.git" tap
          cp Scripts/homebrew/youty.rb tap/Formula/youty.rb
          cd tap
          if git diff --quiet; then echo "tap already current"; exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/youty.rb
          git commit -m "youty: bottle for ${TAG}"
          git push
