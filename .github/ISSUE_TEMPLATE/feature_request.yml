name: Feature request
description: Suggest an improvement to Youty.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Youty is deliberately lean, private, and 100% on-device. Requests that keep it that way
        are most likely to land. Features that require a network service, an API key, an account,
        or telemetry are out of scope.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case, not just the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
